name: Release

# Publishes to npm when a release tag (v2.0.0, v2.1.3, …) is pushed.
# Prerequisite: versions must already be applied on main — run
# `bun run version:packages` and merge that PR first (see RELEASING.md).
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # push per-package tags and create the GitHub release
      contents: write
      # npm provenance
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test:packages

      - name: Guard against unapplied changesets
        shell: bash
        run: |
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [[ "$pending" != "0" ]]; then
            echo "::error::$pending unapplied changeset(s) found — run 'bun run version:packages' and merge the version PR before tagging."
            exit 1
          fi

      # `changeset publish` publishes every workspace package whose version
      # is not yet on npm, and creates per-package git tags for them.
      - name: Publish to npm
        run: bun run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push per-package tags
        run: git push origin --tags

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
